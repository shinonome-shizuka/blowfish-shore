<?xml version="1.0" encoding="UTF-8"?>
<!--
  longbeach-shore · default cover (dusk)
  Hallmark · palette: shore · mood: dusk
  扎染蓝 (#0900A7) → 电光蓝 (#00D4FF) 对角渐变
  左上角 mono 字「BACKYARD」+ 编号
  右下角荧光绿 (#B7FE4C) 圆点 · 黄昏蚊虫
  1:1.5 aspect ratio（thumbnailAspectRatio 默认 1.5）
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="dusk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0900A7"/>
      <stop offset="55%" stop-color="#1F1A2E"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="22%" r="40%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 底色渐变 -->
  <rect width="600" height="900" fill="url(#dusk)"/>
  <!-- 右上电光蓝晕 -->
  <rect width="600" height="900" fill="url(#glow)"/>

  <!-- 左下荧光绿蚊虫（黄昏未暗的意象）-->
  <circle cx="92" cy="816" r="6" fill="#B7FE4C" opacity="0.85"/>
  <circle cx="148" cy="772" r="3" fill="#B7FE4C" opacity="0.6"/>
  <circle cx="68" cy="744" r="2.5" fill="#B7FE4C" opacity="0.5"/>

  <!-- 左上 mono 序号 -->
  <text x="48" y="84" fill="#F5F2EA" opacity="0.5"
        font-family="ui-monospace, 'SF Mono', Consolas, monospace"
        font-size="14" font-weight="500" letter-spacing="3.5">
    00 / BACKYARD
  </text>

  <!-- 中央大字 -->
  <text x="48" y="468" fill="#F5F2EA"
        font-family="ui-serif, Georgia, serif"
        font-size="84" font-weight="700" letter-spacing="-2.5">
    长滩
  </text>
  <text x="48" y="558" fill="#F5F2EA"
        font-family="ui-serif, Georgia, serif"
        font-size="84" font-weight="700" letter-spacing="-2.5">
    后院
  </text>

  <!-- 底部一句诗 -->
  <text x="48" y="852" fill="#F5F2EA" opacity="0.7"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="15" font-weight="400" letter-spacing="0.5">
    横剑夜听雨浸溪
  </text>
</svg>
